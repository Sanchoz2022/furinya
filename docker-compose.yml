services:
  ollama:
    image: ollama/ollama:0.20.6
    volumes:
      - ./bin/ollama:/root/.ollama
      - ./ollama_setup.sh:/ollama_setup.sh
    ports:
      - "11434:11434"
    restart: always
    entrypoint: [ "/usr/bin/bash", "/ollama_setup.sh" ]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  sd:
    image: universonic/stable-diffusion-webui:full
    command: --medvram --api
#    command: --lowvram --api # replace with this if your PC is a potato
    restart: always
    ports:
      - "7860:8080/tcp"
    volumes:
      - ./bin/sd/inputs:/app/stable-diffusion-webui/inputs
      - ./bin/sd/textual_inversion_templates:/app/stable-diffusion-webui/textual_inversion_templates
      - ./bin/sd/embeddings:/app/stable-diffusion-webui/embeddings
      - ./bin/sd/extensions:/app/stable-diffusion-webui/extensions
      - ./bin/sd/models:/app/stable-diffusion-webui/models
      - ./bin/sd/localizations:/app/stable-diffusion-webui/localizations
      - ./bin/sd/outputs:/app/stable-diffusion-webui/outputs
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      mode: global
      placement:
        constraints:
          - "node.labels.iface != extern"
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]

  whisper:
    image: hwdsl2/whisper-server:cuda
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - ./bin/whisper:/var/lib/whisper
    environment:
#      - WHISPER_DEVICE=cuda
      - WHISPER_API_KEY=
      - WHISPER_MODEL=large-v3-turbo
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  omnivoice-server:
    # https://github.com/maemreyo/omnivoice-server
    # you need to build this first
    image: omnivoice-server
    pull_policy: never # only use local image
    container_name: omnivoice-server
    ports:
      - "8880:8880"
    volumes:
      # Persist voice profiles
      - ./bin/omnivoice/profiles:/home/ubuntu/app/profiles
      - ./bin/omnivoice/huggingface:/home/ubuntu/.cache/huggingface # persist HF cache for offline use
    environment:
      # Server configuration
      - OMNIVOICE_HOST=0.0.0.0
      - OMNIVOICE_PORT=6020
      - OMNIVOICE_DEVICE=cuda
      - OMNIVOICE_NUM_STEP=32
      - OMNIVOICE_MAX_CONCURRENT=2
      # HF_HUB_OFFLINE=1  # enables server in a no Internet docker config
      # Optional: Enable authentication
      # - OMNIVOICE_API_KEY=your-secret-key
      # Optional: Adjust inference quality
      # - OMNIVOICE_GUIDANCE_SCALE=2.0
      # - OMNIVOICE_DENOISE=true
      # Optional: Logging
      - OMNIVOICE_LOG_LEVEL=info
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8880/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

