services:
  llama-server:
    build:
      context: .
      dockerfile: Dockerfile.llama
    container_name: kuni-llama-server
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./bin/llama/models:/models:ro
    # Запуск Gemma 4 E2B на GPU с её родным мультимодальным проектором и контекстом 16K
    command: >
      /app/llama.cpp/build/bin/llama-server 
      -m /models/Gemma-4-E4B-Uncensored-HauhauCS-Aggressive-Q4_K_M.gguf 
      --mmproj /models/mmproj-gemma-4-E4B-q8_0.gguf
      -c 32768 
      -np 1 
      --embedding 
      --pooling mean
      --port 8090 
      --host 0.0.0.0 
      -ngl 99 
      -fa on 
      -t 8 
      -tb 8
      --cache-type-k q4_0
      --cache-type-v q4_0
      --batch-size 4096
      --ubatch-size 4096
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  whisper:
    image: hwdsl2/whisper-server:cuda
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./bin/whisper:/var/lib/whisper
    environment:
      - WHISPER_API_KEY=
      - WHISPER_MODEL=large-v3-turbo
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  sd:
    image: universonic/stable-diffusion-webui:full
    container_name: kuni-sd
    restart: always
    network_mode: host
    # Запуск SD на GPU с оптимизацией памяти --medvram и ускорением xformers
    command: --medvram --xformers --api --port 7860
    volumes:
      - ./bin/sd/inputs:/app/stable-diffusion-webui/inputs
      - ./bin/sd/textual_inversion_templates:/app/stable-diffusion-webui/textual_inversion_templates
      - ./bin/sd/embeddings:/app/stable-diffusion-webui/embeddings
      - ./bin/sd/extensions:/app/stable-diffusion-webui/extensions
      - ./bin/sd/models:/app/stable-diffusion-webui/models
      - ./bin/sd/localizations:/app/stable-diffusion-webui/localizations
      - ./bin/sd/outputs:/app/stable-diffusion-webui/outputs
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
